<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PTM WORKspace</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Babel untuk kompilasi JSX di browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- html2canvas untuk Fitur Download JPEG -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <!-- Import Maps untuk React & Lucide Icons -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1"
      }
    }
  </script>
  
  <style>
    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #e2e8f0; }
    ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    
    /* Animasi Sangat Halus dan Mulus untuk Kartu dengan Bayangan Gelap */
    .glass-card {
      transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Scrollbar tersembunyi untuk menu rekap absensi */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    
    html {
      scroll-behavior: smooth;
    }

    body { -webkit-tap-highlight-color: transparent; }

    /* Background Animation subtle */
    .bg-animate {
      background: linear-gradient(-45deg, #e2e8f0, #cbd5e1, #f1f5f9, #e2e8f0);
      background-size: 400% 400%;
      animation: gradient 15s ease infinite;
    }

    @keyframes gradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Animasi UFO Culik Sapi */
    @keyframes ufo-fly {
      0% { transform: translate(150px, -20px) rotate(20deg) scale(0.5); opacity: 0; }
      15% { transform: translate(0px, 0px) rotate(-5deg) scale(1); opacity: 1; }
      20%, 55% { transform: translate(0px, -5px) rotate(0deg) scale(1); opacity: 1; filter: drop-shadow(0 10px 15px rgba(34,211,238,0.6)); }
      60% { transform: translate(0px, -10px) rotate(-15deg) scale(1); opacity: 1; }
      80%, 100% { transform: translate(-200px, -50px) rotate(-20deg) scale(0.5); opacity: 0; }
    }
    .anim-ufo { 
      animation: ufo-fly 4s cubic-bezier(0.4, 0, 0.2, 1) infinite; 
      display: inline-block; 
    }

    @keyframes cow-abduct {
      0%, 25% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
      50% { transform: translateY(-40px) scale(0.3) rotate(360deg); opacity: 0.8; }
      55%, 100% { transform: translateY(-50px) scale(0) rotate(720deg); opacity: 0; }
    }
    .anim-cow { 
      animation: cow-abduct 4s cubic-bezier(0.4, 0, 0.2, 1) infinite; 
      display: inline-block; 
    }

    @keyframes beam-drop {
      0%, 22% { opacity: 0; transform: scaleY(0); }
      28%, 48% { opacity: 0.8; transform: scaleY(1); }
      52%, 100% { opacity: 0; transform: scaleY(0); }
    }
    .anim-beam { 
      animation: beam-drop 4s ease-in-out infinite; 
      transform-origin: top center;
    }
  </style>
</head>
<body class="bg-slate-200 antialiased overflow-x-hidden bg-animate">
  
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      LayoutGrid, Folder, ExternalLink, Plus, Trash2, ChevronRight, Lock, 
      Unlock, LogOut, Home, Search, Globe, Info, ArrowRight, ArrowLeft, 
      Command, PlusCircle, Bell, User, MoreVertical, Activity, Loader2, Copy, Check, Pencil, AlertCircle, RefreshCw,
      Receipt, CheckSquare, Square, X, UserPlus, Download, Wallet, TrendingUp, CheckCircle2
    } from 'lucide-react';

    // =====================================================================
    // PASTE URL WEB APP GOOGLE SCRIPT ANDA DI SINI
    // =====================================================================
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbz-80vbbyU0ni-aMrhL7zEFLrR2q5Dy7ZXdqkgwpwH7fSNcmPaXUIl5E5_taOWr8GLFoQ/exec';

    // Bridge Fetch API (Menghubungkan GitHub Pages ke Google Script dengan proteksi CORS)
    const runGoogleScript = async (funcName, ...args) => {
      if (!GAS_URL || GAS_URL === 'MASUKKAN_URL_WEB_APP_GOOGLE_SCRIPT_ANDA_DISINI' || !GAS_URL.startsWith('http')) {
        throw new Error('URL Google Script belum diisi di kode. Harap perbarui const GAS_URL.');
      }

      try {
        const response = await fetch(`${GAS_URL}?action=${funcName}`, {
          method: 'POST',
          redirect: 'follow',
          headers: { 
            'Content-Type': 'text/plain;charset=utf-8'
          },
          body: JSON.stringify(args)
        });
        
        if (!response.ok) {
          throw new Error(`HTTP Error: ${response.status}. Pastikan akses Web App disetel ke "Anyone".`);
        }

        const textResponse = await response.text();
        let result;
        try {
          result = JSON.parse(textResponse);
        } catch(e) {
          throw new Error('Respon server tidak valid. Pastikan fungsi doPost() terpasang dengan benar di Code.gs.');
        }

        if (result.status === 'success') {
          return result.data;
        } else {
          throw new Error(result.message || 'Server gagal memproses permintaan.');
        }
      } catch (error) {
        console.error('Fetch Error:', error);
        throw error;
      }
    };

    const MONTHS = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Ags', 'Sep', 'Okt', 'Nov', 'Des'];

    const formatRp = (angka) => {
      return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka || 0);
    };

    const App = () => {
      const [apps, setApps] = useState([]);
      const [isLoading, setIsLoading] = useState(true);
      const [isFadingOut, setIsFadingOut] = useState(false);
      const [loadError, setLoadError] = useState(null); 
      const [currentFolderId, setCurrentFolderId] = useState(null);
      const [isAdmin, setIsAdmin] = useState(false);
      
      const [showLoginModal, setShowLoginModal] = useState(false);
      const [showAddModal, setShowAddModal] = useState(false);
      const [showEditModal, setShowEditModal] = useState(false);
      const [showPasswordModal, setShowPasswordModal] = useState(false);
      const [showPaymentModal, setShowPaymentModal] = useState(false);
      const [showRevenueModal, setShowRevenueModal] = useState(false);
      
      const [password, setPassword] = useState('');
      const [newPassword, setNewPassword] = useState('');
      const [notification, setNotification] = useState(null);
      const [typedText, setTypedText] = useState("");
      const [copied, setCopied] = useState(false);

      const [childApps, setChildApps] = useState([]);
      const [editChildApps, setEditChildApps] = useState([]);
      const [deletedChildApps, setDeletedChildApps] = useState([]);
      
      const [newApp, setNewApp] = useState({ name: '', type: 'app', url: '', parentId: null, price: '' });
      const [editingApp, setEditingApp] = useState(null);

      // Rekap Pembayaran State
      const [payments, setPayments] = useState([]);
      const [selectedPayAppId, setSelectedPayAppId] = useState('');
      const [newMemberName, setNewMemberName] = useState('');
      const [isPayLoading, setIsPayLoading] = useState(false);

      // Bulan saat ini (0 = Jan, 11 = Des) untuk pewarnaan oranye
      const currentMonthIndex = new Date().getMonth();
      const currentMonthStr = MONTHS[currentMonthIndex];

      useEffect(() => {
        const text = "space";
        let i = 0;
        const timer = setTimeout(() => {
          const interval = setInterval(() => {
            setTypedText(text.slice(0, i + 1));
            i++;
            if (i >= text.length) clearInterval(interval);
          }, 150);
          return () => clearInterval(interval);
        }, 600);
        return () => clearTimeout(timer);
      }, []);

      useEffect(() => {
        if (notification) {
          const timer = setTimeout(() => setNotification(null), 3000);
          return () => clearTimeout(timer);
        }
      }, [notification]);

      // Modifikasi: Fetch data Apps dan Payments bersamaan agar Tagihan siap ditampilkan di beranda
      const fetchFreshData = async () => {
        setIsLoading(true);
        setIsFadingOut(false);
        setLoadError(null);
        try {
          const [appsData, paymentsData] = await Promise.all([
            runGoogleScript('getApps'),
            runGoogleScript('getPayments').catch(() => []) // Jangan sampai error payment memblokir apps
          ]);
          setApps(appsData || []);
          setPayments(paymentsData || []);
          
          // Memicu animasi transisi menghilang secara halus (fade-out)
          setIsFadingOut(true);
          setTimeout(() => {
            setIsLoading(false);
            setIsFadingOut(false);
          }, 800); // Menyesuaikan durasi transisi opacity dari CSS
        } catch (err) {
          setLoadError(err.message);
          setIsLoading(false);
          setIsFadingOut(false);
        }
      };

      useEffect(() => {
        fetchFreshData();
      }, []);

      const filteredApps = useMemo(() => {
        return apps.filter(app => {
          const isRootItem = !app.parentId || app.parentId === "" || String(app.parentId).trim() === "null";
          if (!currentFolderId) {
            return isRootItem;
          }
          return String(app.parentId) === String(currentFolderId);
        });
      }, [apps, currentFolderId]);

      const loadPayments = async () => {
        setIsPayLoading(true);
        try {
          const data = await runGoogleScript('getPayments');
          setPayments(data || []);
        } catch (e) {
          setNotification({ type: 'error', message: 'Gagal memuat rekap pembayaran' });
        }
        setIsPayLoading(false);
      };

      const handleLogin = async (e) => {
        e.preventDefault();
        setNotification({ type: 'success', message: 'Memproses verifikasi...' });
        try {
          const isValid = await runGoogleScript('verifyPassword', password);
          if (isValid) {
            setIsAdmin(true);
            setShowLoginModal(false);
            setPassword('');
            setNotification({ type: 'success', message: 'Status Admin Aktif' });
          } else {
            setNotification({ type: 'error', message: 'Sandi Salah! Cek sel F1' });
          }
        } catch (error) {
          setNotification({ type: 'error', message: 'Error Server: ' + error.message });
        }
      };

      const handleChangePassword = async (e) => {
        e.preventDefault();
        if (!newPassword) return;
        setNotification({ type: 'success', message: 'Memperbarui spreadsheet...' });
        try {
          await runGoogleScript('changePassword', newPassword);
          setShowPasswordModal(false);
          setNewPassword('');
          setNotification({ type: 'success', message: 'Sandi F1 telah diperbarui' });
        } catch (error) {
          setNotification({ type: 'error', message: 'Gagal memperbarui sandi' });
        }
      };

      const handleAddApp = async (e) => {
        e.preventDefault();
        const folderOrAppId = Math.random().toString(36).substr(2, 9);
        const appToSave = { ...newApp, id: folderOrAppId, parentId: currentFolderId || '' }; 
        
        setShowAddModal(false);
        setNotification({ type: 'success', message: 'Menyimpan entri...' });

        try {
          await runGoogleScript('saveApp', appToSave);
          
          if (newApp.type === 'category' && childApps.length > 0) {
            const promises = childApps.map(child => {
              const childId = Math.random().toString(36).substr(2, 9);
              const childAppToSave = { name: child.name, type: 'app', url: child.url, id: childId, parentId: folderOrAppId, price: child.price, isPro: child.isPro || false };
              return runGoogleScript('saveApp', childAppToSave);
            });
            await Promise.all(promises);
          }

          await fetchFreshData();
          setNotification({ type: 'success', message: 'Berhasil disimpan' });
          setNewApp({ name: '', type: 'app', url: '', parentId: null, price: '' });
          setChildApps([]); 
        } catch (error) {
          setNotification({ type: 'error', message: 'Gagal menyimpan data' });
        }
      };

      const handleEditApp = async (e) => {
        e.preventDefault();
        setShowEditModal(false);
        setNotification({ type: 'success', message: 'Memperbarui data...' });

        try {
          await runGoogleScript('updateApp', editingApp);
          
          if (editingApp.type === 'category') {
            const promises = [];
            deletedChildApps.forEach(id => {
              promises.push(runGoogleScript('deleteApp', id));
            });
            
            editChildApps.forEach(child => {
              if (child.isNew) {
                const newId = Math.random().toString(36).substr(2, 9);
                promises.push(runGoogleScript('saveApp', { ...child, id: newId, type: 'app', parentId: editingApp.id }));
              } else {
                promises.push(runGoogleScript('updateApp', child));
              }
            });
            await Promise.all(promises);
          }

          await fetchFreshData();
          setNotification({ type: 'success', message: 'Berhasil diperbarui' });
          setEditingApp(null);
          setEditChildApps([]);
          setDeletedChildApps([]);
        } catch (error) {
          setNotification({ type: 'error', message: 'Gagal memperbarui data' });
        }
      };

      const deleteApp = async (id) => {
        setNotification({ type: 'success', message: 'Menghapus data...' });
        try {
          await runGoogleScript('deleteApp', id);
          await fetchFreshData();
          setNotification({ type: 'success', message: 'Data berhasil dihapus' });
        } catch (error) {
          setNotification({ type: 'error', message: 'Gagal menghapus data' });
        }
      };

      const handleItemClick = (item) => {
        if (item.type === 'category') {
          setCurrentFolderId(item.id);
        } else {
          window.open(item.url.startsWith('http') ? item.url : `https://${item.url}`, '_blank');
        }
      };

      const copyToClipboard = (text) => {
        const textArea = document.createElement("textarea");
        textArea.value = text;
        document.body.appendChild(textArea);
        textArea.select();
        document.execCommand('copy');
        document.body.removeChild(textArea);
        setCopied(true);
        setNotification({ type: 'success', message: 'No Rekening disalin!' });
        setTimeout(() => setCopied(false), 2000);
      };

      const handleAddMember = async (e) => {
        e.preventDefault();
        if (!newMemberName || !selectedPayAppId) return;

        const newPayId = Math.random().toString(36).substr(2, 9);
        const memberObj = {
          id: newPayId,
          appId: selectedPayAppId,
          memberName: newMemberName,
          history: {}
        };

        setNotification({ type: 'success', message: 'Menyimpan anggota...' });
        setPayments([...payments, memberObj]);
        setNewMemberName('');

        try {
          await runGoogleScript('addMemberPayment', memberObj);
          setNotification({ type: 'success', message: 'Anggota ditambahkan' });
        } catch (err) {
          setNotification({ type: 'error', message: 'Gagal menambah anggota' });
        }
      };

      const handleTogglePayment = async (payId, month) => {
        if (!isAdmin) return;

        const updatedPayments = payments.map(p => {
          if (p.id === payId) {
            return {
              ...p,
              history: { ...p.history, [month]: !p.history[month] }
            };
          }
          return p;
        });

        setPayments(updatedPayments);
        const targetPayment = updatedPayments.find(p => p.id === payId);

        try {
          await runGoogleScript('updateMemberPayment', targetPayment);
        } catch (err) {
          setNotification({ type: 'error', message: 'Gagal update pembayaran' });
        }
      };

      const handleDownloadMultipleJPEG = async () => {
        setNotification({ type: 'success', message: 'Memproses Multi-Unduhan...' });
        
        try {
          const appNodes = document.querySelectorAll('.export-app-node');
          
          if (appNodes.length === 0) {
            setNotification({ type: 'error', message: 'Belum ada data untuk diunduh' });
            return;
          }

          for (let i = 0; i < appNodes.length; i++) {
            const node = appNodes[i];
            const appName = node.getAttribute('data-appname') || 'Aplikasi';
            
            const canvas = await window.html2canvas(node, {
              scale: 2, 
              backgroundColor: '#f8fafc',
              logging: false,
              useCORS: true
            });
            
            const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
            const link = document.createElement('a');
            const dateStr = new Date().toISOString().slice(0, 10);
            
            const safeAppName = appName.replace(/[^a-zA-Z0-9]/g, '_');
            link.download = `Rekap_${safeAppName}_${dateStr}.jpg`;
            link.href = dataUrl;
            link.click();
            
            await new Promise(resolve => setTimeout(resolve, 800));
          }
          
          setNotification({ type: 'success', message: 'Semua gambar berhasil diunduh!' });
        } catch (err) {
          console.error(err);
          setNotification({ type: 'error', message: 'Gagal membuat file JPEG' });
        }
      };

      const closeAddModal = () => {
        setShowAddModal(false);
        setChildApps([]);
        setNewApp({ name: '', type: 'app', url: '', parentId: null, price: '' });
      };

      const closeEditModal = () => {
        setShowEditModal(false);
        setEditingApp(null);
        setEditChildApps([]);
        setDeletedChildApps([]);
      };

      const openEditModal = (item) => {
        setEditingApp({...item});
        if (item.type === 'category') {
          const children = apps.filter(a => a.parentId === item.id);
          setEditChildApps(children.map(c => ({...c, isNew: false, isPro: c.isPro === true || String(c.isPro).toUpperCase() === 'TRUE'})));
          setDeletedChildApps([]);
        }
        setShowEditModal(true);
      };

      if (loadError) {
        return (
          <div className="min-h-screen bg-slate-200 flex flex-col items-center justify-center p-6 text-center animate-in fade-in duration-500">
            <div className="bg-white p-10 md:p-14 rounded-[3rem] shadow-2xl border border-slate-100 max-w-lg w-full">
              <div className="w-20 h-20 bg-rose-50 rounded-3xl flex items-center justify-center text-rose-500 mx-auto mb-8 shadow-inner">
                <AlertCircle size={40} />
              </div>
              <h2 className="text-2xl font-black text-slate-800 uppercase mb-4 tracking-tight">Koneksi Terputus</h2>
              <p className="text-slate-600 text-sm leading-relaxed mb-10 font-medium italic">
                "{loadError}"
              </p>
              <div className="space-y-4">
                <button onClick={fetchFreshData} className="w-full bg-blue-600 text-white px-8 py-5 rounded-[2rem] font-black uppercase text-xs tracking-[0.2em] hover:bg-blue-700 transition-all flex items-center justify-center gap-3 shadow-xl">
                  <RefreshCw size={16} /> Coba Hubungkan Kembali
                </button>
                <div className="pt-4 border-t border-slate-100">
                   <p className="text-[10px] text-slate-400 font-black uppercase tracking-widest leading-relaxed">
                     Tip: Pastikan URL Web App sudah benar dan Deployment disetel ke "Anyone"
                   </p>
                </div>
              </div>
            </div>
          </div>
        );
      }

      const rootAppsForPayment = apps.filter(a => !a.parentId || a.parentId === "" || String(a.parentId).trim() === "null");
      
      // Mengambil aplikasi-aplikasi yang sudah dikonfigurasi daftar member pembayarannya
      const appsWithPayments = rootAppsForPayment.filter(app => payments.some(p => p.appId === app.id));

      // Menghitung Pendapatan
      let grandTotalMonthly = 0;
      let grandTotalYearly = 0;

      const revenueData = rootAppsForPayment.map(app => {
        const appPrice = Number(app.price) || 0;
        const appPayments = payments.filter(p => p.appId === app.id);
        
        let currentMonthCount = 0;
        let yearlyCount = 0;

        appPayments.forEach(pay => {
          if (pay.history?.[currentMonthStr]) currentMonthCount++;
          MONTHS.forEach(m => {
            if (pay.history?.[m]) yearlyCount++;
          });
        });

        const monthlyRev = currentMonthCount * appPrice;
        const yearlyRev = yearlyCount * appPrice;

        grandTotalMonthly += monthlyRev;
        grandTotalYearly += yearlyRev;

        return { ...app, appPrice, currentMonthCount, yearlyCount, monthlyRev, yearlyRev };
      });

      return (
        <div className="min-h-screen bg-transparent font-sans text-slate-900 selection:bg-blue-600 selection:text-white flex flex-col">
          
          {/* LAYAR LOADING DENGAN TRANSISI HALUS (FADE OUT) */}
          {(isLoading || isFadingOut) && (
            <div className={`fixed inset-0 flex flex-col items-center justify-center font-black p-4 bg-slate-200 bg-animate z-[300] transition-opacity duration-700 ease-in-out ${isFadingOut ? 'opacity-0 pointer-events-none' : 'opacity-100'}`}>
              <div className="relative w-64 h-48 flex items-end justify-center overflow-hidden border-4 border-slate-800 rounded-[2.5rem] bg-slate-900 shadow-[0_20px_50px_rgba(15,23,42,0.6)]">
                
                {/* Bintang-bintang Langit Malam */}
                <div className="absolute top-4 left-6 text-xs animate-pulse opacity-70">✨</div>
                <div className="absolute top-10 right-8 text-sm animate-pulse opacity-50" style={{animationDelay: '0.5s'}}>✨</div>
                <div className="absolute top-5 left-1/2 text-[10px] animate-pulse opacity-80" style={{animationDelay: '1.2s'}}>✨</div>
                <div className="absolute top-16 left-10 text-[8px] animate-pulse opacity-40" style={{animationDelay: '0.8s'}}>✨</div>
                
                {/* Sinar Pendaratan (Tractor Beam) */}
                <div className="absolute bottom-6 left-[calc(50%-24px)] w-12 h-[80px] bg-cyan-300/40 blur-[3px] anim-beam rounded-b-full z-10 shadow-[0_0_20px_rgba(103,232,249,0.8)]"></div>
                
                {/* UFO yang Melayang */}
                <div className="absolute bottom-[90px] left-[calc(50%-24px)] text-5xl z-30 anim-ufo drop-shadow-[0_0_15px_rgba(34,211,238,0.9)]">🛸</div>
                
                {/* Manusia Diculik (Menggantikan Sapi) */}
                <div className="absolute bottom-4 left-[calc(50%-16px)] text-3xl z-20 anim-cow drop-shadow-xl">👨‍💼</div>
                
                {/* Tanah / Rumput Malam Hari */}
                <div className="absolute bottom-0 left-0 w-full h-6 bg-emerald-900/90 border-t-2 border-emerald-700 rounded-b-[2rem] z-40 flex items-start justify-between px-4 pt-0.5">
                   <div className="w-1 h-2 bg-emerald-700 rounded-full opacity-50"></div>
                   <div className="w-2 h-1 bg-emerald-700 rounded-full opacity-50 mt-1"></div>
                   <div className="w-1 h-1 bg-emerald-700 rounded-full opacity-50"></div>
                </div>
                <div className="absolute bottom-3 left-4 text-xl opacity-60 z-0 drop-shadow-md">🌲</div>
                <div className="absolute bottom-2 right-6 text-2xl opacity-40 z-0 drop-shadow-md">🌳</div>
              </div>

              {/* Teks Peringatan Lucu */}
              <div className="mt-8 text-center animate-pulse">
                 <p className="text-slate-500 font-black uppercase tracking-[0.2em] text-[10px] md:text-xs mb-1.5 drop-shadow-sm">Anda Pusing Laporan?</p>
                 <p className="text-rose-500 font-black uppercase tracking-[0.1em] text-sm md:text-base drop-shadow-md">Awas Diculik Alien!</p>
              </div>
            </div>
          )}

          {/* HIDDEN CONTAINER FOR DOWNLOADING SEPARATE JPEGS */}
          <div style={{ position: 'absolute', top: '-15000px', left: '-15000px', zIndex: -1 }}>
            <div className="font-sans">
              {rootAppsForPayment.map(app => {
                const appPayments = payments.filter(p => p.appId === app.id);

                  <div className="space-y-2 md:space-y-3">
                    <label className="text-[9px] md:text-[11px] font-black text-slate-400 uppercase tracking-widest ml-1">
                      Nama {newApp.type === 'category' ? 'Folder' : 'Aplikasi'}
                    </label>
                    <input type="text" className="w-full px-5 md:px-8 py-4 md:py-5 bg-slate-50 border-2 border-slate-100 rounded-xl md:rounded-3xl font-black text-sm md:text-lg focus:bg-white focus:border-blue-500 outline-none transition-all" placeholder="Nama..." value={newApp.name} onChange={(e) => setNewApp({...newApp, name: e.target.value})} required />
                  </div>

                  <div className="space-y-2 md:space-y-3">
                    <label className="text-[9px] md:text-[11px] font-black text-slate-400 uppercase tracking-widest ml-1">Harga Berlangganan (Rp)</label>
                    <input type="number" className="w-full px-5 md:px-8 py-4 md:py-5 bg-slate-50 border-2 border-slate-100 rounded-xl md:rounded-3xl font-black text-sm md:text-lg focus:bg-white focus:border-blue-500 outline-none transition-all" placeholder="Misal: 50000" value={newApp.price} onChange={(e) => setNewApp({...newApp, price: e.target.value})} />
                  </div>
                  
                  <div className="space-y-2 md:space-y-3">
                    <label className="text-[9px] md:text-[11px] font-black text-slate-400 uppercase tracking-widest ml-1">Kategori</label>
                    <div className="grid grid-cols-2 gap-3 md:gap-5">
                      <button type="button" onClick={() => setNewApp({...newApp, type: 'app'})} className={`py-4 md:py-5 rounded-xl md:rounded-3xl font-black text-[10px] md:text-[12px] uppercase tracking-widest border-2 md:border-4 transition-all ${newApp.type === 'app' ? 'border-blue-500 bg-blue-50 text-blue-600 shadow-md' : 'bg-slate-50 border-transparent text-slate-400'}`}>🚀 Aplikasi</button>
                      <button type="button" onClick={() => setNewApp({...newApp, type: 'category'})} className={`py-4 md:py-5 rounded-xl md:rounded-3xl font-black text-[10px] md:text-[12px] uppercase tracking-widest border-2 md:border-4 transition-all ${newApp.type === 'category' ? 'border-orange-500 bg-orange-50 text-orange-600 shadow-md' : 'bg-slate-50 border-transparent text-slate-400'}`}>📂 Folder</button>
                    </div>
                  </div>
                  
                  {newApp.type === 'app' && (
                    <div className="space-y-2 md:space-y-3 animate-in slide-in-from-top-2 duration-300">
                      <label className="text-[9px] md:text-[11px] font-black text-slate-400 uppercase tracking-widest ml-1">Link URL</label>
                      <input type="text" className="w-full px-5 md:px-8 py-4 md:py-5 bg-slate-50 border-2 border-slate-100 rounded-xl md:rounded-3xl font-black text-sm md:text-lg focus:bg-white focus:border-blue-500 outline-none transition-all" placeholder="https://..." value={newApp.url} onChange={(e) => setNewApp({...newApp, url: e.target.value})} required />
                    </div>
                  )}

                  {newApp.type === 'category' && (
                    <div className="space-y-4 animate-in slide-in-from-top-2 duration-300 border-t-4 border-dashed border-slate-100 pt-6 md:pt-8 mt-6 md:mt-8">
                      <div className="flex justify-between items-center">
                        <label className="text-[9px] md:text-[11px] font-black text-slate-400 uppercase tracking-widest ml-1">Isi Aplikasi</label>
                        <button type="button" onClick={() => setChildApps([...childApps, {name: '', url: '', price: '', isPro: false}])} className="text-[9px] md:text-[10px] font-black text-blue-600 bg-blue-50 px-3 md:px-4 py-2 rounded-xl flex items-center gap-1.5 md:gap-2 transition-colors">
                          <Plus size={14}/> Tambah App
                        </button>
                      </div>
                      
                      <div className="space-y-4">
                        {childApps.map((child, index) => (
                          <div key={index} className="flex gap-2 md:gap-3 items-start bg-slate-50 p-4 md:p-5 rounded-[1.5rem] md:rounded-[2rem] border-2 border-slate-100 relative group animate-in fade-in slide-in-from-bottom-2">
                             <div className="flex-1 space-y-2 md:space-y-3">
                               <input type="text" placeholder="Nama Aplikasi" value={child.name} onChange={(e) => { const n = [...childApps]; n[index].name = e.target.value; setChildApps(n); }} className="w-full px-4 md:px-5 py-3 md:py-4 bg-white border-2 border-slate-100 rounded-xl md:rounded-2xl font-bold text-xs md:text-sm focus:border-blue-500 outline-none transition-all" required />
                               <div className="flex flex-col md:flex-row gap-2 md:gap-3">
                                 <input type="text" placeholder="URL: https://..." value={child.url} onChange={(e) => { const n = [...childApps]; n[index].url = e.target.value; setChildApps(n); }} className="flex-[2] px-4 md:px-5 py-3 md:py-4 bg-white border-2 border-slate-100 rounded-xl md:rounded-2xl font-bold text-xs md:text-sm focus:border-blue-500 outline-none transition-all" required />
                                 <input type="number" placeholder="Harga (Rp)" value={child.price} onChange={(e) => { const n = [...childApps]; n[index].price = e.target.value; setChildApps(n); }} className="flex-1 px-4 md:px-5 py-3 md:py-4 bg-white border-2 border-slate-100 rounded-xl md:rounded-2xl font-bold text-xs md:text-sm focus:border-blue-500 outline-none transition-all" />
                                 <button type="button" onClick={() => { const n = [...childApps]; n[index].isPro = !n[index].isPro; setChildApps(n); }} className={`flex items-center justify-center gap-1.5 px-4 py-3 md:py-4 border-2 rounded-xl md:rounded-2xl font-black text-[10px] md:text-xs transition-all uppercase tracking-widest ${child.isPro ? 'bg-amber-50 border-amber-400 text-amber-600 shadow-inner' : 'bg-white border-slate-100 text-slate-400 hover:border-amber-300 hover:text-amber-500'}`}>
                                   ⭐ <span className="hidden md:inline">{child.isPro ? 'PRO' : 'Reg'}</span>
                                 </button>
                               </div>
                             </div>
                             <button type="button" onClick={() => setChildApps(childApps.filter((_, i) => i !== index))} className="text-slate-400 hover:text-white bg-white hover:bg-rose-500 p-3 md:p-4 rounded-xl md:rounded-2xl border-2 border-slate-100 hover:border-rose-500 transition-all mt-0.5 md:mt-1">
                               <Trash2 size={16} className="md:w-5 md:h-5" />
                             </button>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}

                  <button className="w-full py-5 md:py-6 bg-blue-600 text-white rounded-[1.5rem] md:rounded-[2rem] font-black shadow-2xl uppercase text-[10px] md:text-[12px] tracking-widest mt-6 md:mt-8 hover:bg-blue-700 active:scale-95 transition-all">Submit ke Spreadsheet</button>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
